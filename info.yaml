# Tiny Tapeout project information
project:
  title:        "GEMM Processing Element"      # Project title
  author:       "Group5"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "FP4 multiply-accumulate processing element for GEMM systolic array"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_example"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "gemm_pe.sv"
    - "FloatP4x16.v"
    - "FloatP16x4.v"
    - "fp16_adder_truncation.sv"
    - "fp16_adder_helpers.v"
    - "FixedP2x4_opt.v"
    - "dadda_mul_trunc.sv"
    - "dadda_reduced.sv"
    - "fa.sv"
    - "ha.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "A_IN[0] - Activation input bit 0 (FP4)"
  ui[1]: "A_IN[1] - Activation input bit 1 (FP4)"
  ui[2]: "A_IN[2] - Activation input bit 2 (FP4)"
  ui[3]: "A_IN[3] - Activation input bit 3 (FP4)"
  ui[4]: "W_IN[0] - Weight input bit 0 (FP4)"
  ui[5]: "W_IN[1] - Weight input bit 1 (FP4)"
  ui[6]: "W_IN[2] - Weight input bit 2 (FP4)"
  ui[7]: "W_IN[3] - Weight input bit 3 (FP4)"

  # Dedicated outputs
  uo[0]: "OUT[0] - Vector FP4 output bit 0 (or ACC[0] debug)"
  uo[1]: "OUT[1] - Vector FP4 output bit 1 (or ACC[1] debug)"
  uo[2]: "OUT[2] - Vector FP4 output bit 2 (or ACC[2] debug)"
  uo[3]: "OUT[3] - Vector FP4 output bit 3 (or ACC[3] debug)"
  uo[4]: "OUT[4] - Unused (0) in vector mode, ACC[4] in debug"
  uo[5]: "OUT[5] - Unused (0) in vector mode, ACC[5] in debug"
  uo[6]: "OUT[6] - Unused (0) in vector mode, ACC[6] in debug"
  uo[7]: "OUT[7] - Unused (0) in vector mode, ACC[7] in debug"

  # Bidirectional pins
  uio[0]: "DATA_VALID - Input: enable MAC operation"
  uio[1]: "RESET_ACC - Input: reset accumulator to zero"
  uio[2]: "LOAD_SCALE_LOW - Input: load scale[7:0] from ui_in"
  uio[3]: "LOAD_SCALE_HIGH - Input: load scale[15:8] from ui_in"
  uio[4]: "VECTOR_MODE - Input: enable vector output (FP4)"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change!
yaml_version: 6
